server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: wishlist
    static_configs:
      - targets:
          - localhost
        labels:
          job: wishlist
          app: wishlist-service
          __path__: /var/log/wishlist/app.log
          
  - job_name: flog
    static_configs:
      - targets:
          - localhost
        labels:
          job: flog
          app: flog
          __path__: /var/log/flog/*.log
